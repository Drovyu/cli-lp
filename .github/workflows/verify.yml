name: Verify

on:
  push:
    branches: [main, release]
  pull_request:
    branches: [main, release]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26.5.0
          cache: npm
      - run: npm ci
      - run: npm run build
